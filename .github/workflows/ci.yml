name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Verify dist is complete
        run: |
          missing=""
          for f in dist/services/antigravityLauncher.js dist/bot/index.js dist/bin/cli.js; do
            [ -f "$f" ] || missing="$missing $f"
          done
          if [ -n "$missing" ]; then
            echo "::error::Missing compiled files:$missing"
            exit 1
          fi
      - run: npm test

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit
